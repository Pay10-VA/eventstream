openapi: 3.0.3
info:
  title: Event Analytics API
  version: 1.0.0
  description: API for ingesting events into the analytics system.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Health
    description: Endpoints related to health checks and system status
  - name: Events
    description: Endpoints for handling/processing events
  - name: Analytics
    description: Endpoints for retrieving analytics data

paths:
  /api/health:
    get:
      summary: Health check endpoint
      tags:
        - Health
      responses:
        "200":
          description: OK

  /api/events:
    post:
      summary: Ingest an event into the analytics system
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "200":
          description: Event ingested successfully
        "400":
          description: Bad request - invalid event data
  /api/events/user/{userId}:
    get:
      summary: Retrieve all events for a specific user
      tags:
        - Events
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the user
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number for pagination (default is 0)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of events per page for pagination (default is 10)
      responses:
        "200":
          description: Events retrieved successfully for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserEvent"
        "400":
          description: Bad request - invalid userId parameter

  /api/events/session/{sessionId}:
    get:
      summary: Retrieve all events for a specific session
      tags:
        - Events
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the session
      responses:
        "200":
          description: Events retrieved successfully for the session
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserEvent"
        "400":
          description: Bad request - invalid sessionId parameter

  /api/analytics/counts:
    get:
      summary: Return all event counts for each event type in the last 10 minutes
      tags:
        - Analytics
      responses:
        "200":
          description: Event counts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCountsResponse"
        "400":
          description: Bad request - invalid query parameters
  /api/analytics/counts/{userId}:
    get:
      summary: Return all event counts for each event type in the last 10 minutes for a specific user
      tags:
        - Analytics
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the user
      responses:
        "200":
          description: Event counts retrieved successfully for the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCountsResponse"
        "400":
          description: Bad request - invalid userId parameter

  /api/analytics/top-events:
    get:
      summary: Return the top 5 most common events in the last 10 minutes
      tags:
        - Analytics
      responses:
        "200":
          description: Top events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    eventType:
                      type: string
                      description: Type of the event
                    count:
                      type: number
                      description: Count of occurrences for the event type
        "400":
          description: Bad request - invalid query parameters

components:
  schemas:
    UserEvent:
      type: object
      properties:
        content:
          type: array
          description: List of events for the user
          items:
            $ref: "#/components/schemas/EventRequest"
        pageable:
          type: object
          properties:
            pageNumber:
              type: number
              description: Current page number
              example: 0
            pageSize:
              type: number
              description: Number of events per page
              example: 10
            sort:
              type: object
              properties:
                sorted:
                  type: boolean
                  description: Indicates if the results are sorted
                  example: true
                unsorted:
                  type: boolean
                  description: Indicates if the results are unsorted
                  example: false
                empty:
                  type: boolean
                  description: Indicates if the sort is empty
                  example: false
            offset:
              type: number
              description: The offset of the current page
              example: 0
            paged:
              type: boolean
              description: Indicates if the results are paged
              example: true
            unpaged:
              type: boolean
              description: Indicates if the results are unpaged
              example: false
        totalElements:
          type: number
          description: Total number of events for the user
          example: 25
        totalPages:
          type: number
          description: Total number of pages available
          example: 3
        last:
          type: boolean
          description: Indicates if this is the last page
          example: false
        numberOfElements:
          type: number
          description: Number of events in the current page
          example: 10
        first:
          type: boolean
          description: Indicates if this is the first page
          example: true
        size:
          type: number
          description: Number of events per page
          example: 10
        number:
          type: number
          description: Current page number
          example: 0
        sorted:
          type: object
          properties:
            sorted:
              type: boolean
              description: Indicates if the results are sorted
              example: true
            unsorted:
              type: boolean
              description: Indicates if the results are unsorted
              example: false
            empty:
              type: boolean
              description: Indicates if the sort is empty
              example: false
        empty:
          type: boolean
          description: Indicates if the page is empty
          example: false
    EventRequest:
      type: object
      required:
        - eventType
        - timestamp
        - userId
        - sessionId
        - metadata
      properties:
        eventType:
          type: string
          description: Type of the event (e.g., "page_view", "click")
        timestamp:
          type: string
          format: date-time
          description: Time when the event occurred
        userId:
          type: string
          description: Unique identifier for the user
        sessionId:
          type: string
          description: Unique identifier for the session
          example: "abc123-session"
        metadata:
          type: object
          description: Additional data related to the event
          properties:
            page:
              type: string
              description: The page where the event occurred
              example: "/home"
            productId:
              type: string
              description: The ID of the product involved in the event
              example: "prod-456"
            productName:
              type: string
              description: The name of the product involved in the event
              example: "Widget A"
            price:
              type: number
              description: The price of the product involved in the event
              example: 19.99
            deviceType:
              type: string
              description: The type of device used for the event
              example: "mobile"
    EventCountsResponse:
      type: object
      required:
        - pageViewCount
        - productViewCount
        - addToCartCount
        - removeFromCartCount
        - checkoutStartCount
        - purchaseCount
        - searchCount
        - sessionStartCount
      properties:
        pageViewCount:
          type: number
          description: Number of page view events
          example: 5
        productViewCount:
          type: number
          description: Number of product view events
          example: 3
        addToCartCount:
          type: number
          description: Number of add to cart events
          example: 7
        removeFromCartCount:
          type: number
          description: Number of remove from cart events
          example: 2
        checkoutStartCount:
          type: number
          description: Number of checkout start events
          example: 4
        purchaseCount:
          type: number
          description: Number of purchase events
          example: 1
        searchCount:
          type: number
          description: Number of search events
          example: 6
        sessionStartCount:
          type: number
          description: Number of session start events
          example: 8
